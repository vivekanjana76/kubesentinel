apiVersion: kind.x-k8s.io/v1alpha4
kind: Cluster
name: kubesentinel

nodes:
  - role: control-plane
    image: kindest/node:v1.33.0
    extraPortMappings:
      # Prometheus UI
      - containerPort: 30090
        hostPort: 9090
        protocol: TCP
      # Alertmanager UI
      - containerPort: 30093
        hostPort: 9093
        protocol: TCP
    kubeadmConfigPatches:
      - |
        kind: InitConfiguration
        nodeRegistration:
          kubeletExtraArgs:
            node-labels: "ingress-ready=true"
